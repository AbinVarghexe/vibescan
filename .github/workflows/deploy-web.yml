name: Deploy Web Interface

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - 'vibescan/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy-docker:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(python -c "import sys; sys.path.insert(0, '.'); from vibes can import __version__; print(__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vibescan:latest
            ${{ secrets.DOCKER_USERNAME }}/vibescan:${{ steps.version.outputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/vibescan:latest
          cache-to: type=inline

  deploy-heroku:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    needs: deploy-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: true
          docker_heroku_process_type: web

  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: deploy-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: deploy-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: vibescan-web

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: deploy-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_DEPLOY_HOOK }}"

  notify-success:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [deploy-docker, deploy-heroku, deploy-fly, deploy-railway, deploy-render]
    if: success()
    steps:
      - name: Create deployment summary
        run: |
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Web interface deployed to:" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Docker Hub: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/vibescan" >> $GITHUB_STEP_SUMMARY
          echo "- 🟣 Heroku: https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com" >> $GITHUB_STEP_SUMMARY
          echo "- 🪰 Fly.io: https://vibescan.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- 🚂 Railway: (check Railway dashboard)" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 Render: (check Render dashboard)" >> $GITHUB_STEP_SUMMARY