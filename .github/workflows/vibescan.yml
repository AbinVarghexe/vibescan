name: VibeScan Security Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install VibeScan
        run: |
          pip install -e .

      - name: Run VibeScan Analysis
        run: |
          # Fails the build if critical AI hallucination/slopsquatting risks are found
          vibescan .