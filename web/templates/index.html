<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeScan - AI Dependency Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #4c51bf;
        }

        input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results {
            display: none;
        }

        .results.show {
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .status-safe {
            background: #10b981;
            color: white;
        }

        .status-suspicious {
            background: #f59e0b;
            color: white;
        }

        .status-critical {
            background: #ef4444;
            color: white;
        }

        .dependency-list {
            margin-top: 20px;
        }

        .dependency-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .dep-safe {
            background: #f0fdf4;
            border-color: #10b981;
        }

        .dep-suspicious {
            background: #fffbeb;
            border-color: #f59e0b;
        }

        .dep-critical {
            background: #fef2f2;
            border-color: #ef4444;
        }

        .dep-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .dep-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .dep-score {
            background: rgba(0,0,0,0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
        }

        .dep-reasons {
            list-style: none;
            padding-left: 20px;
        }

        .dep-reasons li {
            margin: 5px 0;
            color: #666;
        }

        .dep-reasons li:before {
            content: "⚠ ";
            margin-right: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error.show {
            display: block;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .summary-item {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9ff;
        }

        .summary-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .summary-label {
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 VibeScan</h1>
            <p class="tagline">AI Dependency Security Scanner</p>
        </header>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('upload')">Upload File</button>
                <button class="tab" onclick="switchTab('paste')">Paste Content</button>
            </div>

            <div id="upload-tab" class="tab-content active">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3>Drop your file here or click to browse</h3>
                    <p>Supported: package.json, requirements.txt</p>
                    <input type="file" id="fileInput" accept=".json,.txt" onchange="handleFileSelect(event)">
                </div>
            </div>

            <div id="paste-tab" class="tab-content">
                <select id="fileType" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 2px solid #e0e0e0;">
                    <option value="package.json">package.json</option>
                    <option value="requirements.txt">requirements.txt</option>
                </select>
                <textarea id="textInput" placeholder="Paste your package.json or requirements.txt content here..."></textarea>
                <br><br>
                <button class="btn" onclick="scanText()">Scan Dependencies</button>
            </div>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Scanning dependencies...</p>
        </div>

        <div class="results card" id="results">
            <h2>Scan Results</h2>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'upload') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('upload-tab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('paste-tab').classList.add('active');
            }
        }

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            showLoading();
            hideError();
            hideResults();

            fetch('/api/scan', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                }
            })
            .catch(error => {
                hideLoading();
                showError('An error occurred: ' + error.message);
            });
        }

        function scanText() {
            const content = document.getElementById('textInput').value;
            const fileType = document.getElementById('fileType').value;

            if (!content.trim()) {
                showError('Please paste some content to scan');
                return;
            }

            showLoading();
            hideError();
            hideResults();

            fetch('/api/scan-text', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: content,
                    type: fileType
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                }
            })
            .catch(error => {
                hideLoading();
                showError('An error occurred: ' + error.message);
            });
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultsContent');

            let statusClass = 'status-safe';
            let statusText = '✅ Safe';
            if (data.status === 'suspicious') {
                statusClass = 'status-suspicious';
                statusText = '⚠️ Suspicious';
            } else if (data.status === 'critical') {
                statusClass = 'status-critical';
                statusText = '❌ Critical';
            }

            let html = `
                <div class="status-badge ${statusClass}">${statusText}</div>
                <div class="summary">
                    <div class="summary-item">
                        <div class="summary-number">${data.total}</div>
                        <div class="summary-label">Total Dependencies</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-number" style="color: #10b981;">${data.safe.length}</div>
                        <div class="summary-label">Safe</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-number" style="color: #f59e0b;">${data.suspicious.length}</div>
                        <div class="summary-label">Suspicious</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-number" style="color: #ef4444;">${data.critical.length}</div>
                        <div class="summary-label">Critical</div>
                    </div>
                </div>
            `;

            if (data.critical.length > 0) {
                html += '<h3 style="color: #ef4444;">❌ Critical Risk Dependencies</h3>';
                html += '<div class="dependency-list">';
                data.critical.forEach(dep => {
                    html += renderDependency(dep, 'critical');
                });
                html += '</div>';
            }

            if (data.suspicious.length > 0) {
                html += '<h3 style="color: #f59e0b; margin-top: 30px;">⚠️ Suspicious Dependencies</h3>';
                html += '<div class="dependency-list">';
                data.suspicious.forEach(dep => {
                    html += renderDependency(dep, 'suspicious');
                });
                html += '</div>';
            }

            if (data.safe.length > 0) {
                html += '<h3 style="color: #10b981; margin-top: 30px;">✅ Safe Dependencies</h3>';
                html += '<div class="dependency-list">';
                data.safe.forEach(dep => {
                    html += renderDependency(dep, 'safe');
                });
                html += '</div>';
            }

            contentDiv.innerHTML = html;
            resultsDiv.classList.add('show');
        }

        function renderDependency(dep, severity) {
            let html = `
                <div class="dependency-item dep-${severity}">
                    <div class="dep-header">
                        <div>
                            <span class="dep-name">${dep.name}</span>
                            <span style="color: #666; margin-left: 10px;">(${dep.ecosystem})</span>
                        </div>
                        <div class="dep-score">Score: ${dep.score}/100</div>
                    </div>
            `;

            if (dep.reasons && dep.reasons.length > 0) {
                html += '<ul class="dep-reasons">';
                dep.reasons.forEach(reason => {
                    html += `<li>${reason}</li>`;
                });
                html += '</ul>';
            }

            html += '</div>';
            return html;
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.remove('show');
        }

        function hideResults() {
            document.getElementById('results').classList.remove('show');
        }
    </script>
</body>
</html>
